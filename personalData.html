<!DOCTYPE html>
<html>
  <head>
    <title>Personal Data</title>

    <link
      rel="stylesheet"
      href="styles/personalData.css"
    >
  </head>

  <body>
    <!-- link back to the main page-->
    <a href="mainWebpage.html">
      <span>Back to main page</span>
    </a>

    <div class="">
      <label for="calorie-goal">Your calorie goal is</label>
      <input 
        placeholder="> 0 kcal"
        class="js-calorie-goal box-design hidden-display"
        id="calorie-goal">
      <span class="js-display-calorie-goal"></span>

      <label>and range is</label>
      <input class='js-calorie-range box-design hidden-display' placeholder="0-100 %" >
      <span class="js-display-calorie-range"></span>

      <button class="js-calorie-save-setting-button calorie-save-setting-button">Save</button>
      <button class="js-calorie-setting-update-button hidden-display">Update</button>
    </div>

    <p>Adverse Food Reaction</p>
    <div class="input-design-grid">

      <label>Please enter your food allergens (if any)</label>
      <input class="js-food-allergen-input">
      <button class="js-add-button-food-allergens">Add</button>
      <div class="js-display-food-allergens"></div>

      <label>Please enter your food intolerance (if any)</label>
      <input class="js-food-intolerance-input">
      <button class="js-add-button-food-intolerance">Add</button>
      <div class="js-display-food-intolerance"></div>
    </div>

    <label>Do you have Celiac disease?</label>

    <label>
      <input type="radio" name="celiac-disease" value="yes">
      Yes  
    </label>

    <label>
      <input type="radio" name="celiac-disease" value="no">
      No
    </label>

    <script type="module" src="scripts/personalData.js"></script>

  </body>
</html>
